name: Build iOS Release

on:
  push:
    branches:
      - release/ios

jobs:
  build:
    name: Build iOS Release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/kinshipSync

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/kinshipSync/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install

      - name: Increment version
        id: version
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          
          # Increment patch version
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          
          # Update iOS version
          cd ios
          agvtool new-version -all $(echo $NEW_VERSION | sed 's/\.//g')
          agvtool new-marketing-version $NEW_VERSION
          cd ..
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json
          git add ios/kinshipSync.xcodeproj/project.pbxproj
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump iOS version to ${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Create Git Tag
        run: |
          if git rev-parse "ios-v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ios-v${{ steps.version.outputs.version }} already exists"
          else
            git tag "ios-v${{ steps.version.outputs.version }}"
            git push origin "ios-v${{ steps.version.outputs.version }}"
          fi

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain

          # Import certificate to keychain
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Clean up
          rm certificate.p12

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create directory for provisioning profiles if it doesn't exist
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Decode and copy provisioning profile
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          # Clean up
          rm profile.mobileprovision

      - name: Build iOS App
        env:
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
        run: |
          cd ios
          xcodebuild -workspace kinshipSync.xcworkspace \
            -scheme kinshipSync \
            -configuration Release \
            -archivePath $PWD/build/kinshipSync.xcarchive \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            clean archive

      - name: Export IPA
        env:
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath $PWD/build/kinshipSync.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $PWD/build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: kinship-ios-v${{ steps.version.outputs.version }}.ipa
          path: mobile/kinshipSync/ios/build/kinshipSync.ipa

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Decode API Key
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > appstore_key.p8
          
          # Upload using altool
          xcrun altool --upload-app -f ios/build/kinshipSync.ipa \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --api-key-path appstore_key.p8

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ios-v${{ steps.version.outputs.version }}
          release_name: iOS Release v${{ steps.version.outputs.version }}
          body: |
            Automated iOS release for version ${{ steps.version.outputs.version }}
            
            Changes:
            - Version bumped to ${{ steps.version.outputs.version }}
            - Uploaded to App Store Connect
          draft: false
          prerelease: false
